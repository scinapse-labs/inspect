name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc -p inspect-cli

      - name: Run tests
        run: cargo test

      - name: Check binary exists
        shell: pwsh
        run: dir target/x86_64-pc-windows-msvc/release/inspect.exe
